<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Google Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav">

            <a href="#">Images</a>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <div class="logo">
            <h1>
                <span class="blue">G</span>

    <footer>
        <p>Cameroon</p>
